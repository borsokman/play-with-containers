### OpenAPI Documentation (`config.yaml`)

```yaml
openapi: 3.0.0
info:
  title: Movie Streaming Platform API Gateway
  description: API Gateway routing to Inventory and Billing microservices.
  version: 1.0.0
servers:
  - url: http://192.168.56.10:5000
    description: Vagrant API Gateway VM
paths:
  /api/movies:
    get:
      summary: Retrieve all movies
      parameters:
        - in: query
          name: title
          schema:
            type: string
          description: Filter movies by title
      responses:
        '200':
          description: A list of movies
    post:
      summary: Create a new movie
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - title
                - description
              properties:
                title:
                  type: string
                description:
                  type: string
      responses:
        '201':
          description: Movie created successfully
    delete:
      summary: Delete all movies
      responses:
        '200':
          description: All movies deleted
  '/api/movies/{id}':
    get:
      summary: Retrieve a single movie by ID
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Movie details
        '404':
          description: Movie not found
    put:
      summary: Update a single movie by ID
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                description:
                  type: string
      responses:
        '200':
          description: Movie updated successfully
        '404':
          description: Movie not found
    delete:
      summary: Delete a single movie by ID
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Movie deleted successfully
        '404':
          description: Movie not found
  /api/billing:
    post:
      summary: Submit a billing order
      description: Asynchronously processes a billing order via RabbitMQ.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - user_id
                - number_of_items
                - total_amount
              properties:
                user_id:
                  type: string
                number_of_items:
                  type: integer
                total_amount:
                  type: number
      responses:
        '202':
          description: Message posted to queue successfully